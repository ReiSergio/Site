<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Last Frontier – Other Donations</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Orbitron', sans-serif;
      background: url("background2.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #d7e9ff;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(162, 68, 123, 0.25), transparent 60%),
                  radial-gradient(circle at 80% 75%, rgba(0, 255, 255, 0.15), transparent 60%);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: pulse-bg 12s infinite alternate;
    }
    @keyframes pulse-bg { from { opacity: .35; } to { opacity: 1; } }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 45px;
      background: rgba(0, 0, 0, 0.45);
      border-bottom: 1px solid rgba(162, 68, 123, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(162, 68, 123, 0.6);
    }

    header img {
      height: 46px;
      width: 46px;
      border-radius: 50%;
      box-shadow: 0 0 14px #a2447b;
      transition: .3s;
    }
    header img:hover { transform: rotate(8deg) scale(1.06); }

    nav { display: flex; gap: 23px; }
    nav a {
      font-size: 16px;
      font-weight: 600;
      color: #ff80d4;
      text-decoration: none;
      transition: .25s;
    }
    nav a:hover { text-shadow: 0 0 12px #ff80d4; }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content {
      max-width: 900px;
      padding: 45px;
      border-radius: 25px;
      background: rgba(0, 0, 0, 0.32);
      border: 1px solid rgba(162, 68, 123, 1);
      backdrop-filter: blur(12px);
      animation: glow 2.5s infinite alternate;
      box-shadow: 0 0 28px rgba(162, 68, 123, 0.7);
    }
    @keyframes glow { from { box-shadow: 0 0 14px #a2447b; } to { box-shadow: 0 0 30px #a2447b; } }

    .hero h2 {
      font-size: 42px;
      color: #ff92ed;
      margin-bottom: 20px;
      text-shadow: 0 0 18px #ff92ed;
    }

    .entry {
      margin: 23px auto;
      padding: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(162, 68, 123, .8);
      border-radius: 14px;
      max-width: 720px;
      transition: .3s;
      box-shadow: 0 0 14px rgba(162, 68, 123, .6);
    }
    .entry:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 0 32px rgba(162, 68, 123, 1); }
    .entry h4 { margin-bottom: 14px; font-size: 21px; color: #ff7fcf; }
    .entry p { font-size: 15px; word-break: break-all; }

    .link-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 18px;
      font-size: 16px;
      color: #fff;
      background: rgba(0, 169, 255, 0.55);
      border-radius: 10px;
      text-decoration: none;
      transition: .25s;
      box-shadow: 0 0 16px rgba(0, 169, 255, .8);
    }
    .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 26px rgba(0, 169, 255, 1); }

    .back-btn {
      margin-top: 40px;
      display: inline-block;
      font-size: 18px;
      padding: 14px 34px;
      color: #fff;
      background: rgba(255, 50, 200, 0.55);
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 0 22px rgba(255, 50, 200, .8);
      transition: .25s;
    }
    .back-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 50, 200, 1); }

    footer {
      margin-top: auto;
      padding: 30px;
      text-align: center;
      background: rgba(0, 0, 0, 0.45);
      border-top: 1px solid rgba(162, 68, 123, 0.8);
      backdrop-filter: blur(12px);
    }
    footer img {
      height: 44px;
      border-radius: 50%;
      margin-bottom: 12px;
      box-shadow: 0 0 12px #a2447b;
    }
    footer span { display: block; font-size: 15px; color: #b2eaff; }
  </style>
</head>

<body>

<header>
  <div class="logo"><img src="tlf_circular.png" alt="TLF"></div>
  <nav>
    <a href="index.html">About</a>
    <a href="https://discord.gg/mYn57emhGG" target="_blank">Discord</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Thank you for supporting the project.</h2>

    <div class="entry">
      <h4>DonationAlerts</h4>
      <a class="link-btn" href="Blocked.html" target="_blank">
        Open DonationAlerts Page
      </a>
    </div>


    <div class="entry">
      <h4>Pay Pal</h4>
      <a class="link-btn"
         href="https://paypal.me/Afonsorodrigo4"
         target="_blank"
         rel="noopener noreferrer">
        Open Pay Pal
      </a>
    </div>

    <a class="back-btn" href="donate.html">⬅ Back to Donations</a>
  </div>
</section>

</body>
</html>
